name: Daily LinkedIn Posts

on:
  schedule:
    # Runs every day at 8:00 AM UTC (adjust timezone if needed)
    - cron: '0 8 * * *'
  workflow_dispatch:  # Allow manual trigger from GitHub

jobs:
  generate-posts:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
    
    - name: Install Playwright (for carousel rendering)
      run: |
        playwright install chromium
    
    - name: Create output directory
      run: mkdir -p output/posts_$(date +%Y%m%d)/logs
    
    - name: Configure environment
      run: |
        echo "OPENROUTER_API_KEY=${{ secrets.OPENROUTER_API_KEY }}" > .env
        echo "ZERNIO_API_KEY=${{ secrets.ZERNIO_API_KEY }}" >> .env
        echo "LINKEDIN_ACCOUNT_ID=${{ secrets.LINKEDIN_ACCOUNT_ID }}" >> .env
        echo "ZERNIO_BASE_URL=https://zernio.com/api/v1" >> .env
        echo "LOG_LEVEL=INFO" >> .env
        echo "✅ Environment configured"
    
    - name: Debug environment
      run: |
        echo "📁 Current directory: $(pwd)"
        echo "🐍 Python version: $(python --version)"
        echo "📂 Project structure:"
        ls -la src/ config/ 2>/dev/null || echo "Directory check failed"
      continue-on-error: true
    
    - name: Run LinkedIn Posts Pipeline
      run: |
        echo "🚀 Starting LinkedIn Posts Pipeline..."
        python main.py
      env:
        ZERNIO_API_KEY: ${{ secrets.ZERNIO_API_KEY }}
        LINKEDIN_ACCOUNT_ID: ${{ secrets.LINKEDIN_ACCOUNT_ID }}
        OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
        LOG_LEVEL: INFO
    
    - name: Check generated outputs
      run: |
        echo "📂 Generated files:"
        ls -la output/posts_$(date +%Y%m%d)/ 2>/dev/null || echo "Output directory not found"
        echo "📋 Logs:"
        ls -la logs/ 2>/dev/null || echo "No logs directory"
      continue-on-error: true
    
    - name: Commit and push outputs
      run: |
        git config user.name "linkedin-bot"
        git config user.email "bot@github.com"
        git add output/ logs/ 2>/dev/null || true
        git commit -m "Daily posts: $(date +%Y-%m-%d)" || echo "No changes to commit"
        git remote set-url origin https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git
        git push origin main || echo "Push failed (non-critical)"
      continue-on-error: true
    
    - name: Job Summary
      run: |
        echo "✅ Daily LinkedIn posts pipeline executed!" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "**Pipeline Stages Completed:**" >> $GITHUB_STEP_SUMMARY
        echo "1. ✅ Stage 1: Generated 5 realistic test posts (News, Tips, Carousel, Infographic, Motivation)" >> $GITHUB_STEP_SUMMARY
        echo "2. ✅ Stage 2: Attached AI-contextual Unsplash images to posts" >> $GITHUB_STEP_SUMMARY
        echo "3. ✅ Stage 3: Generated professional visuals (carousel PNG + infographic)" >> $GITHUB_STEP_SUMMARY
        echo "4. ✅ Stage 4: Posted to LinkedIn via Zernio API with scheduling" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "**Generated Files (in output/ directory):**" >> $GITHUB_STEP_SUMMARY
        echo "- \`test_posts_YYYYMMDD.txt\` — All 5 post types" >> $GITHUB_STEP_SUMMARY
        echo "- \`posts_with_images.json\` — Posts with image URLs" >> $GITHUB_STEP_SUMMARY
        echo "- \`carousel_*.png\` — Carousel image (1200×1500px)" >> $GITHUB_STEP_SUMMARY
        echo "- \`infographic_*.png\` — Infographic chart (1200×1800px)" >> $GITHUB_STEP_SUMMARY
        echo "- \`linkedin_posting_log_YYYYMMDD.json\` — LinkedIn posting results & IDs" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "**Configuration:**" >> $GITHUB_STEP_SUMMARY
        echo "- Entry point: \`main.py\` (orchestrates all 4 stages)" >> $GITHUB_STEP_SUMMARY
        echo "- Core scripts: \`src/\` directory (modular, production-ready)" >> $GITHUB_STEP_SUMMARY
        echo "- Shared config: \`config/\` directory (constants, logging, utilities)" >> $GITHUB_STEP_SUMMARY
        echo "- Logging: \`logs/linkedin_pipeline_YYYYMMDD.log\` (structured, no secrets)" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "🎉 **Your LinkedIn posts are now live!** Check the logs for details.">> $GITHUB_STEP_SUMMARY
