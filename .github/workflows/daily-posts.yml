name: Daily LinkedIn Posts

on:
  schedule:
    # Runs every day at 8:00 AM UTC (adjust timezone if needed)
    - cron: '0 8 * * *'
  workflow_dispatch:  # Allow manual trigger from GitHub

jobs:
  generate-posts:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
    
    - name: Configure environment
      run: echo "OPENROUTER_API_KEY=${{ secrets.OPENROUTER_API_KEY }}" > .env
    
    - name: Fetch news
      run: python3 fetch_ai_news_rss.py
    
    - name: Generate posts
      run: python3 generate_posts_2post_model.py
    
    - name: Attach images
      run: python3 attach_images_to_posts.py
    
    - name: Update Excel
      run: python3 update_post_history.py
    
    - name: Commit and push outputs
      run: |
        git config user.name "linkedin-bot"
        git config user.email "bot@github.com"
        git add linkedin_posts_*.txt post_history.xlsx output/ post-rotation-log.json 2>/dev/null || true
        git commit -m "Daily posts: $(date +%Y-%m-%d)" || echo "No changes to commit"
        git push
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    
    - name: Job Summary
      run: |
        echo "✅ Daily LinkedIn posts generated successfully!" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "**Generated Files:**" >> $GITHUB_STEP_SUMMARY
        echo "- \`linkedin_posts_$(date +%Y%m%d).txt\` — Daily posts" >> $GITHUB_STEP_SUMMARY
        echo "- \`post_history.xlsx\` — Excel tracking" >> $GITHUB_STEP_SUMMARY
        echo "- \`post-rotation-log.json\` — Rotation state" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "📋 Next: Copy posts to LinkedIn manually or set up LinkedIn API integration" >> $GITHUB_STEP_SUMMARY
